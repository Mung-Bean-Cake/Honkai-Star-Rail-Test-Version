l_simp_chinese:
 #起源
 auth_lieshou:"星核猎手组织"
 gov_lieshou:"星核猎手"
 StellaronHunter:"星核猎手"
 councilor_ruler_administrator:"猎手总管"
 lieshou_leader:"猎手总管"
 origin_StellaronHunter:"星核猎手"
 origin_tooltip_StellaronHunter_effects:0 "星核猎手是由能预知未来的「命运的奴隶」艾利欧创立，信奉终末星神，旨在通过夺取星核执行「剧本」以对抗毁灭、改写宇宙命运的隐秘组织 。‌‌‌星核猎手成员严格遵循艾利欧编写的「剧本」，成员行动看似疯狂无序，实则是为了达成特定未来节点。组织成员极少但个个拥有覆灭星球级的战力。艾利欧的剧本并非单一结局，而是基于无数尝试后找到的唯一生路。"
 origin_StellaronHunter_desc:"星核猎手这次的行动也在剧本之中，前往注定的坏结局，改变宇宙的走向，战胜强大的天灾，为宇宙带来新生"
 The_StellaronHunter_start_screen_messages:0 "星核猎手这次的行动也在剧本之中，前往注定的坏结局，改变宇宙的走向，战胜强大的天灾，为宇宙带来新生"
 civic_StellaronHunter_1:"命运指引"
 civic_StellaronHunter_1_desc:"依照「命运的奴隶」艾利欧的剧本达成特定的未来节点，为了最终获得「好结局」。"
 civic_StellaronHunter_2:"光与影"
 civic_StellaronHunter_2_desc:"星核猎手和星穹列车的关系就如同光与影一样。"
 councilor_StellaronHunter_1:"剧本践行者"
 councilor_StellaronHunter_1_desc:"艾利欧剧本中的重要一环"
 councilor_StellaronHunter_2:"剧本转达者"
 councilor_StellaronHunter_2_desc:"负责转达艾利欧的剧本"
 #特质
 trait_StellaronHunter_pop_1:"格拉默残裔"
 trait_StellaronHunter_pop_1_desc:"以流萤为蓝本，重启格拉默生产线后制造的物种，充满了对未来的希望，在凝聚力和贸易生产上有高加成。"
 trait_StellaronHunter_pop_2:"长寿诅咒"
 trait_StellaronHunter_pop_2_desc:"拥有可怖的自愈能力，对他们来说，长生不是赐福，而是一种挥之不去的诅咒。漫长的寿命使他们失去了对未来的方向，同样也不再热衷于生产。"
 trait_StellaronHunter_pop_3:"骇客天赋"
 trait_StellaronHunter_pop_3_desc:"将宇宙视为游戏，有高超骇客天赋，喜欢通过骇入进行劫富济贫，能提升星球上的进阶产出，同时，使用骇客技术需要耗费大量能量币。"
 trait_StellaronHunter_pop_4:"言灵术"
 trait_StellaronHunter_pop_4_desc:"拥有语言催眠的能力，能通过言灵提高星球幸福度和星球基础产出。"
 trait_StellaronHunter_pop_5:"格拉默兵器"
 trait_StellaronHunter_pop_5_desc:"以格拉默帝国女皇为蓝本制造的基因改造克隆人战士，即格拉默铁骑，这些战士在诞生时被植入了保卫“格拉默帝国”和效忠女皇的“思想钢印”。拥有极为强大的战斗能力，与之相对的，这些战士寿命极短，同时消耗的食物和消费品很多。"
 trait_StellaronHunter_pop_6:"恶魔血脉"
 trait_StellaronHunter_pop_6_desc:"卡芙卡的故乡天衣五被星核污染，居民因缺乏恐惧概念而被欲望支配，演变为「恶魔」。"
 trait_StellaronHunter_pop_7:"传奇骇客"
 trait_StellaronHunter_pop_7_desc:"朋克洛德至今流传着传奇骇客银狼的事迹，当地人受这些事迹影响，有着很强的凝聚力。"
 trait_StellaronHunter_pop_8:"炉火淬炼"
 trait_StellaronHunter_pop_8_desc:"受刃随手点播的冶炼师，有着很高的冶炼天赋。"
