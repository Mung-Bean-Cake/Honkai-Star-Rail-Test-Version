 district_StellaronHunter_planet_1:"武备中心"
 district_StellaronHunter_planet_1_plural:"武备中心"
 district_StellaronHunter_planet_1_desc:"武备中心能维持星球秩序，产出幸福度和舰容上限"
 district_StellaronHunter_planet_2:"工业组装区划"
 district_StellaronHunter_planet_2_plural:"工业区划"
 district_StellaronHunter_planet_2_desc:"工业区划和组装区划的变体，对于很多智械来说，基于自己原有的身体进行升级强化是个好方法，因此工业区划也经常有机械组装中心"
 district_StellaronHunter_planet_5:"数据交互中心"
 district_StellaronHunter_planet_5_plural:"数据交互中心"
 district_StellaronHunter_planet_5_desc:"用于增加额外方程内容的区划，这里非常大，主要是存放机器，只有少量的人员会驻扎在这里"
 district_StellaronHunter_planet_6:"收藏中心"
 district_StellaronHunter_planet_6_plural:"收藏中心"
 district_StellaronHunter_planet_6_desc:"对于银狼来说，比黑塔获得更多的收藏品便是收藏中心存在的最大意义"
