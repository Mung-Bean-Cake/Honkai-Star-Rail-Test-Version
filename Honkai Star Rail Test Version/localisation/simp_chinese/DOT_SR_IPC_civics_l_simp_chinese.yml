l_simp_chinese:
 origin_hsr_ipc: "星际和平公司"
 origin_hsr_ipc_desc: "就对外宣传而言，公司是一家倡导自由贸易的巨型企业财团；从运作方式上来看，公司是发行货币并垄断资源的商界独裁；择创业初心而论，公司则是为「存护」的星神奉献一切的无私后援。大多数星际公民谈到公司时，总会言及无所不在的商品与醒目标识：仿佛「只要存在交易之处，就存在星际和平公司」。事实上，银河中几乎所有的商业行为确是建立在公司的「信用点」体系之上。若将星际贸易比作运动比赛，那么公司既是顶尖的运动员，又是各种运动项目，既是比赛场地，同时还是规则本身。对财富绝对的统治力，以及从未停止过的扩张行为，让星际和平公司产生了一种阴谋独裁者的大众印象。但是公司对于「只手遮天」之流的低等愿景毫不在意，因为企业精神自诞生之初就未曾变动：§H将一切奉献给「琥珀王」——克里珀。§!"
 #国民理念
 civic_marketing_expansion_department: "§A市场开拓部§!"
 civic_marketing_expansion_department_desc: "市场开拓部着眼于前往更多星系宣传克里珀的使命。同时它也负责将新世界拉入宇宙商业体系。星际和平公司市场开拓部发售的银河大乐透，其营销方针正如奥斯瓦尔多·施耐德本人一样充满激情与热血，只需一块星际货币就可以赌一次自己的好运，贩卖人人都有机会成为宇宙富豪加入商业体系的造梦体验，在奥斯瓦尔多·施耐德的营销下，通常很少有新世界能抵御这种诱惑——他们为了赢得入场券，纷纷加入星际和平公司的宇宙商业体系，从而获得在自己的国度开展银河大乐透活动的加盟资格。"
 civic_marketing_expansion_department_effect:"-解锁分部建筑['building:building_marketing_expansion_department']$TABBED_NEW_LINE$-每当我们与其他国家签订贸易协定时，我方会刷新['concept_pan_galaxy_trade_system']效果，立即获得一笔贸易和凝聚力收益，签订的另一方国家获得['concept_pan_galaxy_trade_system_member']身份"
 councilor_marketing_expansion_department: "§A市场开拓部主管§!"
 councilor_marketing_expansion_department_desc: "负责与新世界的建交，达成初期商业项目"
 civic_business_consolidation_department:"§A业务巩固部§!"
 civic_business_consolidation_department_desc:"当市场开拓部完成与新世界的建交后，后续商业就被移交给业务巩固部。该部门负责统管公司的超距传输网络,清点特色物资并定价,长期维护公司下属设施及货品清单。业务巩固部是公司最庞大的部门,员工数占总部总数的45%。"
 civic_business_consolidation_department_effect:"-解锁分部建筑['building:building_civic_business_consolidation_department']$TABBED_NEW_LINE$公司专属企业建筑将产生更多贸易，提供更多的岗位。"
 councilor_business_consolidation_department:"§A业务巩固部主管§!"
 councilor_business_consolidation_department_desc:"业务巩固部主管，董事会理事"
 civic_strategic_investment_department:"§A战略投资部§!"
 civic_strategic_investment_department_desc:"战略投资部拥有公司第二长远的眼光，他们的投资从不拘泥于短期回报。投资部下设精英使团「不良资产清算专家（石心十人）」，由神秘的主管「钻石」——公司少数被证实的「存护」令使统领。他们奔行宇宙，积极地清算因万界之癌产生的坏账，其成员出身各异，职责也各不相同，甚至有轮替的记录。唯一的共性是他们均受「钻石」本人拔擢，并被授予了名为「基石」的身份凭证。「石心十人」的成员需要凭借其努力才能开凿到基石。"
 civic_strategic_investment_department_effect:"-解锁分部建筑['building:building_strategic_investment_department']$TABBED_NEW_LINE$每在一个星球/方舟首次建造分部建筑['building:building_strategic_investment_department']，我方随机星球/方舟获得['concept_d_special_economic_zone']"
 councilor_strategic_investment_department:"§A战略投资部主管§!"
 councilor_strategic_investment_department_desc:"其主管「钻石」——公司少数被证实的「存护」令使统领。"
 civic_building_materials_logistics_department:"§A筑材物流部§!"
 civic_building_materials_logistics_department_desc:"筑材物流部是星际和平公司历史最悠久的部门,它的前身是「琥珀王后援队」,在路易斯崛起后进行了改组。 现任部门主管是大腹便便的塔拉梵·基恩——公司少数被证实的「存护」令使,七人董事会的一员。他担负起向克里珀运送筑材这一神圣的任务,地位愈加稳固。与战略投资部结盟。"
 civic_building_materials_logistics_department_effect:"-解锁分部建筑['building:building_materials_logistics_department']"
 councilor_building_materials_logistics_department:"§A筑材物流部主管§!"
 councilor_building_materials_logistics_department_desc:"现任部门主管是大腹便便的塔拉梵·基恩——公司少数被证实的「存护」令使,七人董事会的一员。他担负起向克里珀运送筑材这一神圣的任务,地位愈加稳固。与战略投资部结盟。"
 civic_techniques_developing_department:"§A技术研发部§!"
 civic_techniques_developing_department_desc:"技术研发部与博识学会展开深度合作，将学会的研究成果转化为商业项目。正所谓「内行管理内行」，公司认可主管亚婆离的科学素养与商业触觉，这位年轻女士同博识学会「庸众院」的联系也总是令人浮想联翩。"
 civic_techniques_developing_department_effect:"-解锁分部建筑['building:building_techniques_developing_department']$TABBED_NEW_LINE$-每当我们与其他国家签订科研协定时，我方会刷新['concept_pan_galaxy_research_system']效果，立即获得一笔贸易和凝聚力收益，签订的另一方国家获得['concept_pan_galaxy_research_system_member']身份"
 councilor_techniques_developing_department:"§A技术研发部主管§!"
 councilor_techniques_developing_department_desc:"主管亚婆离，有着良好的科学素养与商业触觉"
 civic_human_resources_incentive_department:"§A人才激励部§!"
 civic_human_resources_incentive_department_desc:"人才激励部负责为公司招募、培养和输送人才，同时该部门也是众多跨星系项目沟通协作的媒介。"
 civic_human_resources_incentive_department_effect:"-解锁分部建筑['building:building_human_resources_incentive_department']$TABBED_NEW_LINE$-每隔五年进行一次评选，使得一名领袖获得['leader_trait:leader_trait_human_resources']称号，并获得500经验，提升一层职级"
 councilor_human_resources_incentive_department:"§A人才激励部主管§!"
 councilor_human_resources_incentive_department_desc:"人才激励部负责为公司招募、培养和输送人才，同时该部门也是众多跨星系项目沟通协作的媒介。"
 civic_traditional_project_department:"§A传统项目部§!"
 civic_traditional_project_department_desc:"时光变迁让许多产业兴衰起落，也让它们在公司贸易体系内的地位起起伏伏。当一项产业在泛银河贸易版图中所占的比例低于一定阈值时，它将从业务巩固部的职能中脱离，转交由传统项目部的主管在田接受。业绩平平的传统项目部在公司被不太受重视，但也有种观点认为真正的精英都在其中，默默无闻地做着久经考验的事情。"
 councilor_traditional_project_department:"§A传统项目部主管§!"
 councilor_traditional_project_department_desc:"当一项产业在泛银河贸易版图中所占的比例低于一定阈值时，它将从业务巩固部的职能中脱离，转交由传统项目部的主管在田接受。"
 councilor_traditional_project_department_effect:"公司专属企业建筑将产生更多贸易。"
 civic_publicity_Propaganda_department:"§A政宣部§!"
 civic_publicity_Propaganda_department_desc:"主管人：特劳拉·法恩莎，被称为「教母」，势力十分古老，擅长激励和演说。身后追随着四大「护卫队」，掌握着古老的「精神调控」，据说策划过200次谋杀，但特劳拉本人一生只杀过一个人。"
