 DOT_SR_Dvalin.012.name:"开拓天君的赠与：列车「无名」"
 DOT_SR_Dvalin.012.desc:"星穹列车是「开拓」阿基维利制造的工具，用于承载祂与无名客进行星际旅行。据传这样的载具不止一台，但列车里没有其它的纪录。姬子发现列车时，它的记忆体已经损坏，丢失了很多宝贵的资料。只知道：列车确实是阿基维利的造物；列车确实曾与阿基维利一同旅行。"
