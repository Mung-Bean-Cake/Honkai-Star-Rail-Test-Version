 DOT_SR_Dvalin.101.name:"星际和平版历史教科书：琥珀纪元之前的宇宙"
 DOT_SR_Dvalin.101.desc:"宇宙尚处于蛮荒动荡的太古时代，后世史学家统称这段岁月为古兽纪元；彼时星海未宁、秩序未生，广袤宇宙被庞大而原始的黄昏古兽主宰，群星生灵寥落，世界在混沌与荒芜中沉浮；这一时期，宇宙尚无成熟的文明体系与星际规则，古兽凭借与生俱来的力量横行星海，肆意吞噬初生的星辰与寰宇生机。宇宙间最早的一批星神于此乱世诞生，均衡、贪饕、秩序、不朽等本源星神相继登临神位，其中贪饕星神奥博洛斯本就是古兽一脉的蜕变者，成为旧时代霸权的象征；随着初生文明逐步萌芽，生灵与古兽的生存矛盾彻底爆发，席卷整个星海的黄昏战争拉开帷幕；战火绵延无尽，新生文明节节败退，濒临覆灭，宇宙生机几近断绝。直至存护星神克里珀登临神位，以无上神力终结漫长战乱；克里珀筑起隔绝混沌的存护之墙，庇护残存的世界与生灵，彻底终结古兽统治的蛮荒岁月；这场划时代的变革，清零了旧宇宙的混乱秩序，为文明繁衍、星海复苏奠定根基，也正式拉开了琥珀纪元的崭新序幕。"
 DOT_SR_Dvalin.101.a:"伟大！"
 DOT_SR_Dvalin.101.b:"震撼！"
 DOT_SR_Dvalin.101.c:"伪史！"

 #区划
 district_train_planet_1:"列车核心车厢"
 district_train_planet_1_desc:"列车处理单元的主要存放地区"
 district_train_planet_2:"派对车厢"
 district_train_planet_2_desc:"曾用名「会议车厢」，现定名「派对车厢」。现在的主要用途是食堂和酒吧，也用来开会和打桌游，唯独没怎么办过派对。"
 district_train_planet_3:"观景车厢"
 district_train_planet_3_desc:"严格来说，「观景车厢」这个名称似乎有失准确。毕竟很多车厢都有窗子，都可以用来「观景」。但鉴于这节车厢经常用来接待客人——可能那些各式各样的客人，才是车厢中的「景观」吧。"
 district_train_planet_4:"客房车厢"
 district_train_planet_4_desc:"据说在星穹列车的鼎盛时期，有几十上百节这样的乘员车厢。也许有朝一日，星穹列车也会恢复往日的辉煌吧。"
 district_train_planet_5:"末节车厢"
 district_train_planet_5_desc:"在常例的「开拓」之旅中，列车组成员将乘坐安全稳定的降落舱，登陆到预定坐标点；而在变例的「开拓」之旅中，星穹列车会分离出末节车厢作为降落舱使用，并随车厢搭载充足的维生资源，确保无名客在着陆后，能够以车厢为安全屋展开行动。根据列车记录，星穹列车领航员「鸡窝头」鲍勃曾多次使用分离车厢的方式进行着陆，列车车厢的回收率仅有42.4%，而已回收车厢的返修率为100%…自那以后，分离车厢的降落方式被列车长明令禁止，仅在极少数的情况下，被作为特殊的「后备方案」使用。"
