 # 事件
 DOT_SR_Dvalin.001.name:"风魔龙"
 DOT_SR_Dvalin.001.desc:"我名为特瓦林，来自一个失落的位面，故土的生灵将之称为提瓦特。我本是提瓦特蒙德地区的「四风守护」之一，依照旧日的约定，守护世人。因此，人们称我为东风之龙。然而，随着灾难的降临，一切都宣告了结束。谁知蒙德千万里，处处好风光。四时不败之花草，八节长青之树木。一品茶，五色瓜，四季花。地暖山色燕宜家，人闲水北春无价。"
 DOT_SR_Dvalin.001.a:"欢迎你特瓦林"
 DOT_SR_Dvalin.001.b:"这里不欢迎你"

 DOT_SR_Dvalin.002.name:"风魔龙"
 DOT_SR_Dvalin.002.desc:"在漫长的岁月与无边的黑暗中，清澈的宝石也会蒙尘而变得黯淡，高傲的龙也会被侵蚀而充满了忿恨。不过，要记住，尘埃能被轻易拭去，疑惧与毒也能被粉碎。这是我一位朋友的告诫，尽管我一直觉得他不干正事，不像是一个智者。但没有他的帮助，可能也就没有今日的我。他写下过这样一段诗歌：自由地在深空中翱翔吧。就如当年你我相遇时，我行走在大地上，唱着风的歌曲；你则在大气稀薄的高天上，俯瞰世界。如今的天空中没有风雪，大地上充满了绿草，会很美丽吧。如果你也在地面上行走过，听过牧歌和风铃在远方错落的歌，尝过蜜一样甜的酒就会明白吧。如果你曾是我，看见过你在蓝蓝的天上滑翔的孤高模样，见识过你的美丽身姿就好了。如此，你就会明白，这样的天空与大地，是值得为之奋战的。然而，这一切都已逝去，他也不在了。"
 DOT_SR_Dvalin.002.a:"好的"
 DOT_SR_Dvalin.002.b:"再见"

 DOT_SR_Dvalin.003.name:"风魔龙"
 DOT_SR_Dvalin.003.desc:"我的朋友，我知道你很好奇我的过往。我觉得，我也应该将提瓦特与蒙德的故事，告诉你们，让宇宙不要忘记这段失落的历史。「复白亘古事，诗人起歌喉。」「彼时众神居尘世，人世几春秋。」诗人说完了那片废墟的故事、温妮莎的故事，又开始说起了风龙的故事。他诵道：「我的诉说的故事来自于太古，那时众神还行走人世。」就在那个时候，大约五千年之前，挟带着风元素的龙在高天诞生了。它缓缓降下，对世间一切充满了好奇。他落在村落，却被恐惧的人们扔石头击打。龙听不懂人们在恐惧中说出来的话。他落在墓园，只听到了悲伤的人们嗟叹连绵。龙听不懂人们在悲伤中说出来的话。他落在果园，却被失去了果树的愤怒的人们咒骂。龙听不懂人们在愤怒中说出来的话。人世间种种太过纷繁复杂。龙迷惑了，但是龙还是想要尝试。直到有一日，龙听到了天空之琴的声音。「天空」是里拉琴的名字，也是风之神的伴侣。龙被诗文吸引，落在了天空之下最好的歌者身边。人们开始惊慌，因强大的元素之龙和主宰尘世的大神们，向来难以和睦相处。「看啊，它多么美丽，多么温柔。」风之歌者说。「可是，我们不知道它在想什么啊。」人们说。旋律与诗文吸引了龙和人们，这是什么样的魔力呢？龙决定留在歌者身边，因为它也想要万物都能理解它的心。它学会了人的言语，学会了风之歌者的技法。北风骑士的「狼」、蒲公英骑士的「狮子」、西风骑士团的「鹰」，以及特瓦林——「风龙」，就这样被视作是蒙德的「四风守护」。"
 DOT_SR_Dvalin.003.a:"好的"
 DOT_SR_Dvalin.003.b:"再见"

 DOT_SR_Dvalin.004.name:"风魔龙"
 DOT_SR_Dvalin.004.desc:"我的朋友，我知道你很好奇我的过往。我觉得，我也应该将提瓦特与蒙德的故事，告诉你们，让宇宙不要忘记这段失落的历史。「复白亘古事，诗人起歌喉。」「彼时众神居尘世，人世几春秋。」诗人说完了那片废墟的故事、温妮莎的故事，又开始说起了风龙的故事。他诵道：「我的诉说的故事来自于太古，那时众神还行走人世。」就在那个时候，大约五千年之前，挟带着风元素的龙在高天诞生了。它缓缓降下，对世间一切充满了好奇。他落在村落，却被恐惧的人们扔石头击打。龙听不懂人们在恐惧中说出来的话。他落在墓园，只听到了悲伤的人们嗟叹连绵。龙听不懂人们在悲伤中说出来的话。他落在果园，却被失去了果树的愤怒的人们咒骂。龙听不懂人们在愤怒中说出来的话。人世间种种太过纷繁复杂。龙迷惑了，但是龙还是想要尝试。直到有一日，龙听到了天空之琴的声音。「天空」是里拉琴的名字，也是风之神的伴侣。龙被诗文吸引，落在了天空之下最好的歌者身边。人们开始惊慌，因强大的元素之龙和主宰尘世的大神们，向来难以和睦相处。「看啊，它多么美丽，多么温柔。」风之歌者说。「可是，我们不知道它在想什么啊。」人们说。旋律与诗文吸引了龙和人们，这是什么样的魔力呢？龙决定留在歌者身边，因为它也想要万物都能理解它的心。它学会了人的言语，学会了风之歌者的技法。北风骑士的「狼」、蒲公英骑士的「狮子」、西风骑士团的「鹰」，以及特瓦林——「风龙」，就这样被视作是蒙德的「四风守护」。"
 DOT_SR_Dvalin.004.a:"好的"
 DOT_SR_Dvalin.004.b:"再见"

 DOT_SR_Dvalin.005.name:"风魔龙"
 DOT_SR_Dvalin.005.desc:"「古国黑日落，明珠失其光。黄金失其色，白绸染昏黄。」那是发生在地下失落王国坎瑞亚的另外一个故事了。大约三千年之前，整个大陆都经历了一个混乱的时代。黑暗的力量扩散行进，污染所遇到的一切。那段时间里大地上蛮族滋生、魔兽肆虐。人们的生活空间被压缩到了城墙之内，野外充满危险。那段时间对于蒙德来说尤其艰苦。狮牙骑士的传承因无人持有资格而空缺，西风骑士团也因战斗艰苦而人才飘零。这个时候，黑日王朝覆灭，灾难突破了古国城墙在大陆上散布开来。被称为「黄金」的炼金士堕落为了罪人，孕育了大量漆黑的魔兽。漆黑的大蛇——恶龙，「杜林」从海上升起，阴影迫近了蒙德。可这个时候，狮牙骑士的传承出现了空缺，西风骑士团的鹰旗无法迎风而扬。连绵的嗟怨最终再度唤出了蒙德的神——风之歌者。蒙德众人的祈祷最后唤醒了风神的意志，天空之琴再度拨动，风龙也再度被唤来。如今蒙德只剩下风龙可以依靠了。恶龙与风龙便在暴风之中展开了决死的厮杀。风龙最后获胜了，他咬住了恶龙的咽喉，却咽下了毒血。恶龙的毒血，正是被歪曲的黄金，让山峦崩塌、大地坏灭的力量。风龙守护了蒙德，他以为这样人们就会理解它了吧。于是它陷入了长眠。天空之琴奏响了哀伤的曲调。天空之琴说，下一次你醒来时，你应该自由。本应该自由在高天飞行的龙，万物终究会理解你的美丽。"
 DOT_SR_Dvalin.005.a:"好的"
 DOT_SR_Dvalin.005.b:"再见"

 DOT_SR_Dvalin.006.name:"风魔龙"
 DOT_SR_Dvalin.006.desc:"然而，事事岂能如人所愿。杜林尸骸嵌入了寒天雪地之中，特瓦林则被风神召回，陷入沉眠。人们曾经相信风龙会在需要之时转醒，守护蒙德。但在和平的时代，四风守护的信仰已经佚失，对应的庙宇也荒弃了。五百年后，特瓦林在毒血与深渊法师的影响下迷失、堕落。再度觉醒时，没有听到好友的琴声，而是深渊法师的低语。它诅咒自己的宿主，没有在最关键的时刻陪伴到自己身边。特瓦林逐渐化为魔龙而不再是曾今的风龙。甚至沦落到了被骑士团围剿的地步。当世人终于发现，与骑士团数次交战的陌生害兽「风魔龙」，就是四风守护中的特瓦林时，仇恨驱动的对立已经形成，无法和解。时隔百年后苏醒的它，无疑只能感受到这座城市对它的背叛吧。幸好，在一位异乡旅人的帮助下，特瓦林获得了拯救。风向是会转变的。终有一天，会吹向更有光亮的方向。啊，一切都是那么美好。"
 DOT_SR_Dvalin.006.a:"好的"
 DOT_SR_Dvalin.006.b:"再见"

 DOT_SR_Dvalin.007.name:"风魔龙"
 DOT_SR_Dvalin.007.desc:"灾难出现在两千年前的一个夜晚，那时，忽有天穹破碎，巨舰横空，雷霆击穿地脉，位面崩塌，岛屿坠落，神灵遭到猎杀，百姓死于地火。我立于天地之间，见文明毁于一旦，亲友无存，只得孤身逃离此地，流亡太虚。此后千年，我方知晓，昔日灾难的罪魁祸首，名曰：星河猎手！谁知蒙德千万里，处处好风光。四时不败之花草，八节长青之树木。一品茶，五色瓜，四季花。地暖山寒燕宜家，人闲水北春无价。"
 DOT_SR_Dvalin.007.a:"我们希望你加入我们的文明，我们愿意帮助你复仇！"
 DOT_SR_Dvalin.007.b:"故事听完了，再见，朋友！"

 DOT_SR_Dvalin.008.name:"风魔龙"
 DOT_SR_Dvalin.008.desc:"相传仙舟联盟亦有持明一族的五大龙尊，庇佑凡民，其分别是：曜青龙尊，掌应龙之传，宰制风雷，膺责守望胎动之月，尊号「天风君」。朱明龙尊，掌虬龙之传，炳辉天火，膺责守望太始燧皇，尊号「炎庭君」。方壶龙尊，掌蛟龙之传，驯驭冰涛，膺责守望方寸烟海，尊号「冱渊君」。玉阙龙尊，掌地龙之传，凝思静默，膺责守望息壤渊石，尊号「昆冈君」。罗浮龙尊，掌苍龙之传。行云布雨，膺责守望不死建木。尊号「饮月君」。而今，有特瓦特者，为第六龙尊，掌风龙之传，撕雷裂霆，膺责守望苍青之空，尊号「啸风君」。"
 DOT_SR_Dvalin.008.a:"好的"
 DOT_SR_Dvalin.008.b: "再见"

