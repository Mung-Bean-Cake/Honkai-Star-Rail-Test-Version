 DOT_SR_Dvalin.010.name:"帝弓司命的赠与：仙舟「苍城」"
 DOT_SR_Dvalin.010.desc:"仙舟「苍城」是仙舟联盟初创时的九艘旗舰之一，曾被誉为九舟中最繁华的胜境。苍城文风鼎盛，相传设有知名学宫，孕育了深厚的人文传统；本土特产苍城梅曾是舰上标志性植物，所载《苍城方集》中的石犊升麻汤等方剂，至今仍在仙舟联盟内流传沿用。星历6300年，活化行星「噬界罗睺」携丰饶令使倏忽降临苍城。尽管有腾骁将军率领的跨舰援军驰援，苍城仍难逃陷落命运，整艘仙舟被罗睺吞噬解体。受丰饶长生赐福的子民无法死亡，意识与血肉和活行星融为一体，陷入永恒的痛苦囚笼。现在，我将修复好的仙舟「苍城」赠与你，愿你乘此舰，驭长风，破万里星河！"
 DOT_SR_Dvalin.010.a:"好的"
 DOT_SR_Dvalin.010.b: "谢谢"
 NAME_XIANZHOU_AE:"仙舟「苍城」"
 XIANZHOU_AE_Ship:"仙舟「苍城」"
 XIANZHOU_AE_Ship_plural:"仙舟「苍城」"
 XIANZHOU_AE_Ship_cap:"仙舟「苍城」"
 XIANZHOU_AE_Ship_desc:"仙舟「苍城」是仙舟联盟初创时的九艘旗舰之一，曾被誉为九舟中最繁华的胜境。苍城文风鼎盛，相传设有知名学宫，孕育了深厚的人文传统；本土特产苍城梅曾是舰上标志性植物，所载《苍城方集》中的石犊升麻汤等方剂，至今仍在仙舟联盟内流传沿用。星历6300年，活化行星「噬界罗睺」携丰饶令使倏忽降临苍城。尽管有腾骁将军率领的跨舰援军驰援，苍城仍难逃陷落命运，整艘仙舟被罗睺吞噬解体。受丰饶长生赐福的子民无法死亡，意识与血肉和活行星融为一体，陷入永恒的痛苦囚笼。"

 DOT_SR_Dvalin.011.name:"开拓天君的赠与：休伯利安号"
 DOT_SR_Dvalin.011.desc:"休伯利安号是天命组织研发的浮空战列舰，为无量塔姬子率领的女武神第五小队专属旗舰，配属于圣芙蕾雅学园，亦是贯穿全作主线的核心作战载具。舰体全长 278.5 米、甲板长 182 米，标准乘员 50 至 200 人；以 6 座核融合炉为动力核心，搭载列昂诺夫反重力引擎，支持垂直起降与长时间低空悬浮。该舰最初为航空母舰构型，姬子接手后完成针对性改装，拆除舰载飞艇设施，全面强化直射火力：左右舷各配 3 门 430 毫米轨道炮与 3 门 270 毫米轨道炮，辅以 10 套近防系统，核心定位为对抗百米级大型崩坏兽的前线攻坚平台。现在，我将休伯利安号赠与你，愿你乘此舰，驭长风，破万里星河！"
 DOT_SR_Dvalin.011.a:"好的"
 DOT_SR_Dvalin.011.b: "谢谢"
