 building_Defence_Barrier_desc:0"是实现公司的最终目的的时候了。我们将保护这颗美丽的星球。"
 building_Agri_Fac:0"和平食品工厂"
 building_Agri_Fac_desc:0""
 building_Mine_Fac:0"银河开采设施"
 building_Mine_Fac_desc:0""
