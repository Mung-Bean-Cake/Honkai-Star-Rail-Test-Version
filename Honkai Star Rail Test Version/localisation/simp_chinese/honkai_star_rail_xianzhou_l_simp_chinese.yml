 xianzhou_district_3_show:"分配在该区划的每个人力将会产出§H1.5§!$energy_with_icon$，§H1.5§!$minerals_with_icon$，§H1.5§!$food_with_icon$，§H1.5§!$trade_with_icon$，§H1§!$alloys_with_icon$，§H1§!$consumer_goods_with_icon$，§H0.05§!$rare_crystals_with_icon$，§H0.05§!$exotic_gases_with_icon$，§H0.05§!$volatile_motes_with_icon$,§335§!$xianzhou_amenities_with_icon$\n§L天河回星，银浦流云§!\n§L顾名思义，天舶司所掌管的便是仙舟内部空域与星际航行相关的事务；星槎、斗舰、飞舸等交通工具的维护；仙舟与其他智慧种族的贸易、交流。所有与「飞行」相关的事宜都是天舶司的工作。§!"
