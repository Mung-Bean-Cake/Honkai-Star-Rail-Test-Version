 xianzhou_district_4_show:"分配在该区划的每个人力将会产出§H1.5§!$society_research_with_icon$，§H1§!$physics_research_with_icon$，§H1§!$engineering_research_with_icon$，§H1§!$consumer_goods_with_icon$，§H1§!$food_with_icon$，§H0.5§!$trade_with_icon$，§H0.005§!$sr_zro_with_icon$§375§!$xianzhou_amenities_with_icon$\n§L龙虎交回，玄黄再生§!\n§L丹鼎司便负责这里的生物学与医药研究。据传在古老岁月里，仙舟的先民并非长生种。为了解脱老、病、死三苦，他们启航求药。而在获得长生后，丹鼎司又利用星神所留的奇迹阐演「仙道」。不过如今，丹鼎司已然走上衰落之路，最终变成了化外民求医问药之地。在各个洞天开设医馆，提供医疗服务。§!"
