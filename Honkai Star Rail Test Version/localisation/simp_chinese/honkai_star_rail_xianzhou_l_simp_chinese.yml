 xianzhou_district_1_show:"分配在该区划的每个人力将会产出§H0.25§!$unity_with_icon$，§H0.025§!$society_research_with_icon$，§H0.001§!$influence_with_icon$，§H0.01§!$xianzhou_naval_cap$，§H0.015%§!$xianhzou_stability$\n§L裂天坼星，挽弓逐狼§!\n§L云骑军是仙舟的建制武装力量，其建制横跨现存的六座仙舟，六艘仙舟之上各有一位将军节制军队，他们之上设有统帅。云骑军剿灭丰饶孽物，以一个近乎不可能的任务——终结星海之间的不死污染为己任。§!"
