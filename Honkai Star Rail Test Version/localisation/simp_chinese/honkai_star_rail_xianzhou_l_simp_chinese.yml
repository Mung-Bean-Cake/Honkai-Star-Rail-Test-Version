#政策
 xianzhou_name:"£xianzhou_union£仙舟"
 xianzhou_luofu_text:"舰船名称：§K仙舟-「罗浮」§!\n仙舟「罗浮」是仙舟联盟的六大座舰之一，它漂航于无尽的星海中，如无回的神矢射向「巡猎」之主的宿敌。\n与丰饶之民的战争告一段落后，「罗浮」徐徐洄航在众多文明昌盛的星域，与各个世界进行贸易与文化交流。\n他们与星际和平公司签署互市协定，并帮助许多曾被丰饶之民摧毁的世界修复生态。\n因为领受了「丰饶」药师所赐的建木而成为仙舟之首。\n罗浮龙尊，尊号「饮月君」。\n丰饶祸迹为不死建木。\n罗浮签：云骑军拱卫着遮天蔽日的建木，化外民登舟求访，星槎海中人潮汹涌声浪滔天。"
 xianzhou_fanghu_text:"舰船名称：§K仙舟-「方壶」§!\n仙舟「方壶」是仙舟联盟的六大座舰之一。持明族自治领。联盟感念持明镇压寿瘟祸迹的功劳，便将方壶仙舟赠给持明自治。\n星历8072年，游星「计都蜃楼」复苏活化，侵逼方壶。其间战事焦灼，几欲败阵，幸得帝弓神矢扫灭顽敌。方壶仙舟近五分之一洞天受光矢轰击被摧毁。方壶在第三次丰饶战争后，一直奉行自保政策，休养生息。方壶的自保政策，已经使得他们几乎断绝了与其他仙舟之间正常的交流与贸易。\n星历8098年时，停泊于特拉尔特库特利星团兰那地恒星系。若无特殊情况，方壶预计在此处停泊至少十个星历年。\n特产为水产品。\n方壶龙尊，尊号「冱渊君」。\n丰饶祸迹为方寸烟海。\n方壶签：持明游荡于方寸烟海之中，「护珠人」静默凝思，隐隐有肃杀的龙吟声传来。"
 xianzhou_yaoqing_text:"舰船名称：§K仙舟-「曜青」§!\n仙舟「曜青」是仙舟联盟的六大座舰之一，它漂航于无尽的星海中，宛如荡平一切的巨剑，横扫孽物肆虐的众多星域。\n作为六大仙舟中以武力著称的座舰，曜青仙舟长久肩负最为激烈的作战使命。在以狐人为主的曜青劲旅「青丘军」的勇猛追杀下，如步离人之流的孽物大军终成散沙，气数渐衰。\n帝弓神话中，为帝弓的出身地。\n曜青仙舟与星际和平公司长久密切合作，换得作战所需的技术与物资支援。他们扫平众多世界的孽物灾患，也让其中不少成了信用体系的战利品。这些年来，早已失去了以往的模样。传统的曜青建筑被公司大楼替代，曜青的年轻人也深受公司的文化影响。\n曜青龙尊，尊号「天风君」。\n丰饶祸迹为胎动之月。\n曜青签：它挟风驭雷，自九天之外疾驰而来。甲板上无数狐人披甲站立，威风凛凛势不可挡。"
 xianzhou_zhuming_text:"舰船名称：§K仙舟-「朱明」§!\n仙舟「朱明」是仙舟联盟的六大座舰之一，它漂航于无尽的星海中，宛如百炼之锤，锻造许多神兵利器，供云骑军作战所需。\n古国启航的年代里，朱明仙舟就以工巧奇艺和丹鼎技术著称。而在八千年的翱翔之旅中，朱明仙舟不断自我改造，早已失去最初的外形，但工匠们心中燃烧的创新与求知之火从未熄灭。\n如今朱明仙舟成了蜚声星海的工造圣地，它以不逊于螺丝星、庇尔波因特的制造技术引来数之不尽的求学者抵达此处，满载而归。\n星历8098年时，停泊于勒华拉杜里星团史黛拉·山崎恒星系，该恒星系处于克里姆特立宪国疆域内。朱明将在此处进行为期十个星历年的技术交流。朱明期望能用先进的冶炼技术，换取当地极为丰富的矿产资源。\n帝弓神话中，为击退丰饶民，帝弓不顾劝阻进入朱明仙舟深处的牢狱，说服了一直被囚困的岁阳领袖「燧皇」，与它做了夺舍交易，用自己的躯壳换取岁阳之力的协助。\n在火劫大战尾声，岁阳一族已遭彻底禁绝。即便仅有极少数尚存于朱明仙舟之上。岁阳之祖「燧皇」被囚禁在朱明中心，沉沉睡去。围绕这具天体级别的能量生物，朱明工匠们构建了环形的焰轮铸炼宫，汲取其无穷的能量。\n特产为瓷器。\n朱明龙尊，尊号「炎庭君」。\n丰饶祸迹为太始燧皇。\n朱明签：匠人于此熔金铄铁，洪炉昼夜不停吞地吞吐烈焰，甲板上络绎不绝地运输着各式机巧。"
 xianzhou_yuque_text:"舰船名称：§K仙舟-「玉阙」§!\n仙舟「玉阙」是仙舟联盟的六大座舰之一。\n联盟凝视星海的眼睛。拥有联盟第一观星重器，瞰云镜。\n玉阙仙舟目前航至巨人之臂星团外侧，沿古代航路前进，持续勘探。\n第二次丰饶民战争，玉阙仙舟曾被丰饶令使「倏忽」围困。\n数百年前，丰饶之民纠集起惊人的大军攻向玉阙，丰饶民活体唤醒星球「计都蜃楼」，云上五骁解围玉阙仙舟，并击溃了「计都蜃楼」。\n持明五脉与仙舟盟于玉阙。\n特产为玉兆。\n玉阙龙尊，尊号「昆冈君」。\n丰饶祸迹为息壤渊石。\n玉阙签：观星士掌瞰云镜窥向星海深处，玉兆转动不停，于阴霾之中指引众人驶向光亮彼岸。"
 xianzhou_xuling_text:"舰船名称：§K仙舟-「虚陵」§!\n仙舟「虚陵」是仙舟联盟的六大座舰之一。\n星历8098年时，位置不明。\n《仙舟联盟宣言》在虚陵签署。\n似乎是十王司总部所在地。\n联盟的重犯，都需押送至虚陵仙舟，接受帝弓七天将的联席审判。\n虚陵签：其他仙舟于此渡航流转，除此以外再不见人烟，仅有金人星罗密布。"
 xianzhou_default_text:"于古老的神话时代，数艘仙舟受命起航星海寻求长生灵药，求药之舟豪掷光阴岁月，消磨身躯意志，终于盼得药师赐福。然而能够赐予长生的果实却只带来四海萧条、黎庶涂炭。直到巡猎星神岚从深渊归来，以引力为弦、辰矢满弓，一击斫断建木，才断绝了「丰饶」之孽。仙舟脱离迷途之后，受「巡猎」指引成立联盟，组织起强盛的云骑军队。联盟以丰饶孽物为航标，以断绝不死污染为己任，巡疆无垠星野。"
