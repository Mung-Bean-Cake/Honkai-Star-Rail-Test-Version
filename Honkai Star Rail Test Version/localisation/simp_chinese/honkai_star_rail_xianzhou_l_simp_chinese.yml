origin_Xianzhou:0 "仙舟联盟"
origin_Xianzhou_desc:0 "§R[待重制]§!\n于古老的神话时代，数艘仙舟受命起航星海寻求长生灵药，求药之舟豪掷光阴岁月，消磨身躯意志，终于盼得药师赐福；然而能够赐予长生的果实却只带来四海萧条、黎庶涂炭；直到巡猎星神岚从深渊归来，以引力为弦、辰矢满弓，一击斫断建木，才断绝了「丰饶」之孽；仙舟脱离迷途之后，受「巡猎」指引成立联盟，组织起强盛的云骑军队；联盟以丰饶孽物为航标，以断绝不死污染为己任，巡疆无垠星野；漫长岁月里，「仙舟联盟」已登陆过无数曾得神明驻足的世界，将不死孽物尽数消灭，任何祈求丰饶恩惠的星民种族，都不得不将仙舟歼星的威胁考虑其中；而这也正是「仙舟联盟」所寻求的威慑，他们要化身为恒常的警钟，成为一切贪生之人无法支付的代价；时至今日，不同生灵齐聚仙舟，都是为了报复肆意妄为的「丰饶」，彻底贯彻「巡猎的意志」；因此，不死劫难一日不尽，星海巡航便一日不停。"
origin_tooltip_Xianzhou_effects:0 "千秋敌忾，万劫同舟。三千弱水无疆寿，止取一瓢不饮竭。"
Xianzhou_Alliance_start_screen_messages:0 "千秋敌忾，万劫同舟；三千弱水无疆寿，止取一瓢不饮竭。于古老的神话时代，数艘仙舟受命起航星海寻求长生灵药，求药之舟豪掷光阴岁月，消磨身躯意志，终于盼得药师赐福；然而能够赐予长生的果实却只带来四海萧条、黎庶涂炭；直到巡猎星神岚从深渊归来，以引力为弦、辰矢满弓，一击斫断建木，才断绝了「丰饶」之孽；仙舟脱离迷途之后，受「巡猎」指引成立联盟，组织起强盛的云骑军队；联盟以丰饶孽物为航标，以断绝不死污染为己任，巡疆无垠星野；漫长岁月里，「仙舟联盟」已登陆过无数曾得神明驻足的世界，将不死孽物尽数消灭，任何祈求丰饶恩惠的星民种族，都不得不将仙舟歼星的威胁考虑其中；而这也正是「仙舟联盟」所寻求的威慑，他们要化身为恒常的警钟，成为一切贪生之人无法支付的代价；时至今日，不同生灵齐聚仙舟，都是为了报复肆意妄为的「丰饶」，彻底贯彻「巡猎的意志」；因此，不死劫难一日不尽，星海巡航便一日不停。"
