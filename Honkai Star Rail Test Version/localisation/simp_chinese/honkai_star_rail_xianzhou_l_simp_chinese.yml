#区划
 district_xz_yunqi:0 "云骑护卫"
 district_xz_yunqi_desc:0 "云骑军是仙舟联盟的武装力量。其建制横跨现存的六座仙舟，捍卫着仙舟子民的安全，也担负征伐丰饶孽物的重任。"
 district_xz_yunqi_plural:0 "云骑护卫"
 district_xz_danding:0 "丹鼎司"
 district_xz_danding_desc:0 "丹鼎司负责仙舟的生物学、医药研究，并在各个洞天开设医馆，提供医疗服务。据传在古老岁月里，仙舟的先民并非长生种。为了解脱老、病、死三苦，他们启航求药。而在获得长生后，丹鼎司又利用星神所留的奇迹阐演「仙道]。不过如今，丹鼎司已然走上衰落之路，最终变成了化外民求医问药之地。"
 district_xz_danding_plural:0 "丹鼎司"
district_xz_city:0 "天舶司"
district_xz_city_desc:0 "天舶司掌管着仙舟内部空域与星际航行等事务，星槎、斗舰飞舸等交通工具的维护，所有与「飞行」相关的事宜都是天舶司的工作；仙舟与其他智慧种族的贸易、交流也都由天舶司负责处理。"
district_xz_industrial:0 "工造司"
district_xz_industrial_desc:0 "工造、工造，工为工业，造为制造。工造司负责工业开发和制造，是负责设计、制造和改进仙舟上几乎一切物件的司部。包括但不限于武器设计、船怕制造、机巧人工智能等等可制造的物件，小到民用机巧，大到贯星斗舰和洞天，均由这里的匠人所出。他们追求巧夺天工的技艺，以完成「百冶大炼」仪式，被授予「百冶」的称号为目标而奋斗。"
district_xz_science:0 "太卜司"
district_xz_science_desc:0 "太卜司使用名为「玉兆」的晶石计算机技术，负责着占卜未来、信息处理和保存、航路推演、策略运筹等工作。"
district_xz_trade:0 "地衡司"
district_xz_trade_desc:0 "地衡司是仙舟的庶务管理机构，是平日里仙舟的居民接触最多的的机构。举凡人口统计，资源配置，生态治理，历法计时等事宜都交由地衡司擘画。其中也不乏进行社会学、生态学等专业学术研究的学者。"
district_xz_city_plural:0 "天舶司"
district_xz_industrial_plural:0 "工造司"
district_xz_science_plural:0 "太卜司"
district_xz_trade_plural:0 "地衡司"
