 situation_herta_station_fleet:"「黑塔」空间站修复工程"
 situation_herta_station_fleet_desc:"此前末日兽和反物质军团对空间站的袭击造成了不小的影响，舰体和引擎部分损坏，部分人员因此受伤和受到惊吓。我们应该着手进行修复和安抚工作，同时，这次袭击也暴露出空间站目前防御能力的短板，不少人提议应该加强空间站的防御能力，我们或许可以考虑他们的建议。"
