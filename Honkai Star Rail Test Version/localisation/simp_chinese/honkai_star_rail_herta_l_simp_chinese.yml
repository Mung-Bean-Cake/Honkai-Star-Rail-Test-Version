 d_herta_1:0 "收容舱段"
 d_herta_1_desc:0 "收容奇物的储室舱段。中庭建有巨大环形甬道，高低错落，连通着各科室的藏品之间。"
 d_herta_2:0 "支援舱段"
 d_herta_2_desc:0 "空间站的后勤核心，存储各类物资、管理能源核心，配备有完整的接引月台系空间站运作与维系的关键节点。"
 d_herta_3:"虚数能源区划"
 d_herta_3_desc:"将残存在空间站的反物质军团的侵蚀集中收容处理后封存起来的特质的能源区块，经过特殊处理后它们只有发电的作用"
 d_herta_debuff:"裂界侵蚀"
 d_herta_debuff_desc:"黑塔空间站受到反物质军团攻击以后的残留影响，它们通过侵蚀空间站的能源系统来维系自己的存在"
