#初始模拟宇宙项目
 herta_start_situation_chain_title: "模拟宇宙技术转化项目"
 herta_start_situation_chain_desc: "由四位天才联合开发的模拟宇宙大获成功，我们也获得机会承接一些下游技术和项目，通过研究相关技术，我们可以将这些技术转化到实际产业和更加高层次的技术研究，从而推进我们的产业和科技的进步。\n§B一共四个研究方向，完成所有的技术援助方向，将解锁飞升天赋$ap_herta_premote$。§!\n当前研究情况:\n黑塔:[Get_herta_help_text]\n阮梅:[Get_ruanmei_help_text]\n螺丝:[Get_luosi_help_text]\n斯蒂芬:[Get_sidifen_help_text]"
 tech_reserched:"§G已研究§!"
 tech_unreserched:"§R未研究§!"
 DOT_SR_Herta.1000.title:"关于黑塔的技术研究成果承接简报"
 DOT_SR_Herta.1000.desc:"本次关于黑塔的技术研究成果承接由物理学小组承担，技术转化充分的丰富了物理学组的前沿领域的物理模型，指导了理论方面的深层次研究方向，各个科室下发了相关资料供大家研学讨论，本次承接结果大获成功。"
 DOT_SR_Herta.1000.a:"已阅"
 DOT_SR_Herta.1000.tt:"已完成黑塔的技术援助方向，完成所有的技术援助方向，将解锁飞升天赋$ap_herta_premote$"
 DOT_SR_Herta.1001.title:"关于阮梅的技术研究成果承接简报"
 DOT_SR_Herta.1001.desc:"得益于此前对湛蓝星的改造技术的积累，在星球改造方面的技术研究进展飞快，我们现在只需要花上些许时间就可以将星球转换为灵境星球。在基因技术方面，通过小范围的基因改造测试，目前没有产生任何不良反应，我们可以安心的编辑新的基因端"
 DOT_SR_Herta.1001.a:"已阅"
 DOT_SR_Herta.1001.tt:"已完成阮梅的技术援助方向，完成所有的技术援助方向，将解锁飞升天赋$ap_herta_premote$"
 DOT_SR_Herta.1002.title:"关于螺丝的技术研究成果承接简报"
 DOT_SR_Herta.1002.desc:"转接结果：大获成功\n此前的空间站袭击中我们损失了不少高精尖机械化设备以及机械助手，螺丝的新技术不仅帮我们新建修改改造了新的设备和机器助手，还改进了我们的生产建造技术。同时，我们也参考螺丝星的技术，我们已经掌握了一种新的星球转化技术。"
 DOT_SR_Herta.1002.a:"已阅"
 DOT_SR_Herta.1002.tt:"已完成螺丝的技术援助方向，完成所有的技术援助方向，将解锁飞升天赋$ap_herta_premote$"
 DOT_SR_Herta.1003.title:"关于斯蒂芬的技术研究成果承接简报"
 DOT_SR_Herta.1003.desc:"空间站防卫网络已加强，上次空间站遭袭击使得空间站的防卫网络加强的任务迫在眉睫，随着斯蒂芬加盟重新构建防卫体系，现在空间站和湛蓝星的防卫体系已经得到全面的加强。"
 DOT_SR_Herta.1003.a:"已阅"
 DOT_SR_Herta.1003.tt:"已完成斯蒂芬的技术援助方向，完成所有的技术援助方向，将解锁飞升天赋$ap_herta_premote$"
 DOT_SR_Herta.1004.title:"银河学者"
 DOT_SR_Herta.1004.desc:"随着我们科研水平的进一步提升和空间站的修复工程完成，大量的异星学者涌入空间站引发空前的研究浪潮。现在，收藏和研究工作在有条不紊地进行之中"
 DOT_SR_Herta.1004.a:"进步之路！"
 DOT_SR_Herta.1004.tt:"解锁飞升天赋$ap_herta_premote$"