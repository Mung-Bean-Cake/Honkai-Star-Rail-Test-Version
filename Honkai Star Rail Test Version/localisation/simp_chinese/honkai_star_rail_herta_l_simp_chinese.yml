 sm_arkship_hsr_shield_dampener_desc: "安装在舰体各处的干扰发射器会压制附近敌舰的护盾，限制其最大防护能力。"
 sm_arkship_hsr_aura_strike_craft_desc: "方舟舰广播飞行协调信号，提升附近友方舰载机的战斗力。"
 sm_arkship_hsr_aura_hyperlane: "$SHIP_AURA_HYPERLANE$"
 sm_arkship_hsr_aura_hyperlane_desc: "方舟舰投射的导航信标改进了舰队中所有舰船的超空间引擎计算。"
 sm_arkship_hsr_aura_pd_penetration: "$SHIP_AURA_PD_PENETRATION$"
 sm_arkship_hsr_aura_pd_penetration_desc: "方舟舰发出的电子反制广播扰乱了敌方的点防御瞄准，使我方武器得以突破拦截。"
 sm_arkship_hsr_aura_bombardment: "$SHIP_AURA_BOMBARDMENT$"
 sm_arkship_hsr_aura_bombardment_desc: "由方舟舰部署的火控中继提升了整个舰队的轨道轰炸精度。"
 sm_arkship_hsr_aura_range: "$SHIP_AURA_RANGE$"
 sm_arkship_hsr_aura_range_desc: "方舟舰阵列共享的瞄准数据扩大了舰队中每艘舰船的有效交战距离。"
