#花火
 NAME_huahuo:"花火"
 huahuo_catch_phrase:"我这人没什么长性，也很难有持之以恒的梦想…最近的梦想是…加入天才俱乐部！对，扮演一个天才！哈，好想试试这个有难度的挑战…有没有人支持我？"
 huahuo_backstory:"「假面愚者」的成员之一，难以捉摸，不择手段。危险的戏剧大师，沉迷于扮演，身怀千张假面，能化万种面相。财富、地位、权力…于花火而言都不重要，能让她出手的，唯有「乐趣」。"
 hsr_paragon.40.name:"匹诺康尼-花火"
 hsr_paragon.40.a:"初次见面"
 hsr_paragon.40.a.response:"你好你好，我是花火！你要是有什么危险的差事要办，尽管来找我。毕竟只要我感兴趣，价钱都好商量。关键是要玩得开心，对吧？"
 hsr_paragon.40.b:"爱好"
 hsr_paragon.40.b.response:"我喜欢笑话——这个世界太苦大仇深了！当然，笑话不能让世界变得更好，但至少不会让世界变得更加虚伪~不是吗？"
 hsr_paragon.40.c:"见闻"
 hsr_paragon.40.c.response:"大人物们太清楚这个世界是如何运行的了，所以他们制定规则，判断一件事是否违反了法律，又是否遵守了道德…他们甚至连笑话好不好笑都要管！在我看来这才是最好笑的一点。"
 leader_huahuo_t1:"§M虚构无端§!"
 leader_huahuo_t1_desc:"诶呀，最近总是见到你嘛…我在哪儿看见的？这能让你知道吗，嘻嘻～"
 leader_huahuo_t2:"§M独角戏§!"
 leader_huahuo_t2_desc:"我呢，只想当个角落里的配角，平时就给台上的人鼓鼓掌，烘托烘托气氛然后在演出高潮时突然冲上天空，嘭！像花火一样炸它个五彩斑斓——主角敢这么做么？"
 leader_huahuo_t3:"§M游戏人间§!"
 leader_huahuo_t3_desc:"「有几个版本的身世特别招人喜欢。」到了愚者的「酒馆」，花火也只能大大方方地承认，「喜欢和相信是两码事，但大家更愿意相信自己喜欢的故事是真的。」"
 leader_huahuo_t4:"§M一人千役§!"
 leader_huahuo_t4_desc:"愚蠢的智者，聪明的愚者…接下来，我会是谁？"
 leader_huahuo_t5:"§M游戏尘寰§!"
 leader_huahuo_t5_desc:"有人玩游戏，有人照镜子...猜猜我在说谁？"
