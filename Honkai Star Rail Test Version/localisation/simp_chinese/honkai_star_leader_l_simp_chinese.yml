 #丹恒
 NAME_danheng:"丹恒"
 danheng_catch_phrase:"昨日无需留恋。"
 danheng_backstory:"清冷寡言的少年，持有名为「击云」的长枪，于列车漫长的开拓之旅中担任护卫。丹恒对自己的过往始终讳莫如深，他与列车同行正是为了摆脱自己曾亲手造就的一切。然而，列车真的会带着他远离「过去」么？"
 hsr_paragon.59.name:"星穹列车-丹恒"
 hsr_paragon.59.a:"初次见面"
 hsr_paragon.59.a.response:"重新介绍一下自己，我叫丹恒，担任列车的护卫，列车的智库也由我维护。"
 hsr_paragon.59.b:"爱好"
 hsr_paragon.59.b.response:"看书...不算爱好，只是过去的习惯。"
 hsr_paragon.59.c:"见闻"
 hsr_paragon.59.c.response:"当智库的记载足够多时，看似独立的「事件」也会经由流动的「人」产生联系。"
 leader_danheng_t1:"§M绝影§!"
 leader_danheng_t1_desc:"让开，我无意挑起争端。"
 leader_danheng_t2:"§M罡风§!"
 leader_danheng_t2_desc:"如今的我，会选择自己的道路......"
 leader_danheng_t3:"§M一谛天水，六虚洪流§!"
 leader_danheng_t3_desc:"今日所见，也将记录在智库中。"
 leader_danheng_t4:"§M须绳缚身，沉潜勿用§!"
 leader_danheng_t4_desc:"浩瀚如宇宙，它的过去，也由不得自己决定。"
 leader_danheng_t5:"§M洞天幻化，长梦—觉§!"
 leader_danheng_t5_desc:"生死虚实，一念之间。"
