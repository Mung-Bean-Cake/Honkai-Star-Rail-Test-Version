 #米沙
 NAME_misha:"米沙"
 misha_catch_phrase:"「生命是一座迂回的迷宫，除了记忆，我们一无所有。」"
 misha_backstory:"乖巧懂事的「白日梦酒店」门童，梦想成为一名和爷爷一样的银河冒险家。工作十分努力，尤其擅长修理各类机械，热衷于酒店住客分享的星际见闻。希望自己快快长大，期待着早日有一天踏上探索群星的旅程。"
 hsr_paragon.38.name:"匹诺康尼-米沙"
 hsr_paragon.38.a:"初次见面"
 hsr_paragon.38.a.response:"我是「白日梦酒店」的门童米沙，欢迎来到匹诺康尼，请这边走，我来为你搬运行李！"
 hsr_paragon.38.b:"爱好"
 hsr_paragon.38.b.response:"银河地理杂志每一本我都会看…特别是最近一期，那条大鲸鱼还会吞食星球，真的太厉害了！不知道什么时候才能看到下一期……"
 hsr_paragon.38.c:"见闻"
 hsr_paragon.38.c.response:"我常听人说，「开拓」就是进入一片尚未开辟的新领域，匹诺康尼也经历过类似的历史——苏乐达的美味，美梦剧团的演出，都是经由一次次的「开拓」才完成的…真不容易呀……"
 leader_misha_t1:"§M传冲§!"
 leader_misha_t1_desc:"开拓者，你休息得好吗，如果想去哪，请随时来找我！"
 leader_misha_t2:"§M客…客房服务！§!"
 leader_misha_t2_desc:"我喜欢在「白日梦酒店」工作！在这里，能遇见这么多远方来客，能听说那么多冒险故事，真好啊……"
 leader_misha_t3:"§M欢乐年光的影子§!"
 leader_misha_t3_desc:"米沙要努力工作，攒下很多积蓄，以后能像大人们一样在群星之间旅行探索！"
 leader_misha_t4:"§M最初的爱与友谊§!"
 leader_misha_t4_desc:"工作全部完成，好好休息一下吧。"
 leader_misha_t5:"§M铭记于心的约定§!"
 leader_misha_t5_desc:"「白日梦酒店」的工作虽然忙碌，但也因为这份工作，我才能认识像开拓者你这样的朋友！"
