#艾丝妲
 NAME_aisida:"艾丝妲"
 aisida_catch_phrase:"你来了，之前调试的观测阵列该出结果了，有空一起来看看？"
 aisida_backstory:"好奇心与精力都很旺盛的少女，空间站「黑塔」的名义站长。无论是管理各抒己见的科员，还是直接又不失礼貌地回复博识学会的种种刁难，对艾丝妲来说都易如反掌。毕竟指挥空间站…总比继承家业简单吧！"
 hsr_paragon.3.name:"空间站「黑塔」-艾丝妲"
 hsr_paragon.3.a:"初次见面"
 hsr_paragon.3.a.response:"嗨，开拓者，我是空间站「黑塔」的站长艾丝妲。要你帮忙的时候，我一定告诉你…你放心，不和你客气。"
 hsr_paragon.3.b:"爱好"
 hsr_paragon.3.b.response:"持续不断地将资金投入空间站的建设，完善员工福利，形成良性循环，同时满足站长，也就是本人自身必要的购物需求。"
 hsr_paragon.3.c:"见闻"
 hsr_paragon.3.c.response:"即使是监控室，也会处于监控中呢。"
 leader_aisida_t1:"§M流星群落§!"
 leader_aisida_t1_desc:"接受星星的祝福吧~\n§B我方完成星系探索，遗迹挖掘，裂隙探索时，增加一点§R流星§!"
 leader_aisida_t2:"§M星空祝言§!"
 leader_aisida_t2_desc:"渴望着星星奥秘的钥匙啊，向开拓者们赐予你真正的祝福吧！\n$leader_aisida_t2_effect_desc$"
 leader_aisida_t2_effect_desc:"§B处于内阁时，每一点§R流星§!提供0.5%岗位产出的能量币，0.5%岗位产出的贸易，1%亚光速航速，1%跃迁引擎范围§!"
 leader_aisida_t3:"§M天象学§!"
 leader_aisida_t3_desc:"露出破绽咯~\n$leader_aisida_t3_effect_desc$"
 leader_aisida_t3_effect_desc:"§B每一点§R流星§!提供行星/星域2%/1%岗位产出的科研点数§!"
 leader_aisida_t4:"§M灵光一现§!"
 leader_aisida_t4_desc:"幸运儿会是哪个呢~"
 leader_aisida_t5:"§M光谱射线§!"
