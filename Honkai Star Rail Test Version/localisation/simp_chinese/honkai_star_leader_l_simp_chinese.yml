 #银枝
 NAME_yinzhi:"银枝"
 yinzhi_catch_phrase:"「奉献灵魂带有这种意味：每次都可能一去无回，但每次都将决不退缩。」「共勉，我的挚友。」"
 yinzhi_backstory:"「纯美骑士团」的古典骑士。他为人正直、光明磊落，高贵的天性令人敬佩——一位游走宇宙间的独行者，坚定践行「纯美」。维护「纯美」在宇宙间的名誉，是银枝的职责：履行这一职责，起手需虔诚，落枪时则将要令人心悦诚服。"
 hsr_paragon.64.name:"纯美骑士团-银枝"
 hsr_paragon.64.a:"初次见面"
 hsr_paragon.64.a.response:"我是「纯美骑士团」的银枝。我谨在此，以一朵玫瑰的沉重份量，向你致意。"
 hsr_paragon.64.b:"问候"
 hsr_paragon.64.b.response:"如果遇到麻烦，务必让我知晓，我将捍卫你的安全。"
 hsr_paragon.64.c:"见闻"
 hsr_paragon.64.c.response:"你是否听说过不存在「丑恶」的星球？有趣的是，那里的人们眼中同样也不存在「美好」。"
 leader_yinzhi_t1:"§M虔诚§!"
 leader_yinzhi_t1_desc:"片刻，留在眼底"
 leader_yinzhi_t2:"§M公正，此处盛放§!"
 leader_yinzhi_t2_desc:"玛瑙石的谦卑"
 leader_yinzhi_t3:"§M崇高的客体§!"
 leader_yinzhi_t3_desc:"荆棘路的荣光"
 leader_yinzhi_t4:"§M纯粹高洁宣言§!"
 leader_yinzhi_t4_desc:" 遵循纯美骑士的职责。"
 leader_yinzhi_t5:"§M驻于花庭，赐与尽美§!"
 leader_yinzhi_t5_desc:"银河中的一切美丽，我将捍卫至最后一刻。"
