  #卡芙卡
 NAME_kafuka:"卡芙卡"
 kafuka_catch_phrase:"近乎无限长的时间，近乎无限广的空间，而我们同时出现在一处。「命运」就是这样，创造奇迹的同时，让你以为只是偶然。"
 kafuka_backstory:"在星际和平公司的通缉档案里，卡芙卡只留下了名字和「爱好收集大衣」的记录。人们对这位星核猎手所知甚少，只知道她是「命运的奴隶」艾利欧最信任的成员之一。为了到达艾利欧预见的「未来」，卡芙卡开始行动。"
 hsr_paragon.56.name:"星核猎手-卡芙卡"
 hsr_paragon.56.a:"初次见面"
 hsr_paragon.56.a.response:"嗨，列车团…嗯，你们逮住我啦。"
 hsr_paragon.56.b:"爱好"
 hsr_paragon.56.b.response:"我尤其钟爱丝绒质地的大衣，脆弱而美丽，很难保养，稍有不慎便有损它的光泽。"
 hsr_paragon.56.c:"见闻"
 hsr_paragon.56.c.response:"被「星核」改变的世界…我的故乡也是其中之一。可惜了，没有亲眼见证那个时代是如何堕落的。"
 leader_kafuka_t1:"§M夜间喧嚣不止§!"
 leader_kafuka_t1_desc:"只需等待"
 leader_kafuka_t2:"§M月光摩挲连绵§!"
 leader_kafuka_t2_desc:"我赞美，即兴"
 leader_kafuka_t3:"§M温柔亦同残酷§!"
 leader_kafuka_t3_desc:"只有今晚奏鸣"
 leader_kafuka_t4:"§M宽恕无关慈悲§!"
 leader_kafuka_t4_desc:"躯体皆因脆弱而美丽。"
 leader_kafuka_t5:"§M悲剧尽头的颤音§!"
 leader_kafuka_t5_desc:"该说再见了…"
