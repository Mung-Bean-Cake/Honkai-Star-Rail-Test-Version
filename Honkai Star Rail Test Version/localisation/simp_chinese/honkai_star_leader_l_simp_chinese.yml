 #加拉赫
 NAME_jialahe:"加拉赫"
 jialahe_catch_phrase:"五大家系中，「猎犬」担负着守护家园的职责。也就是说…所有犯事儿的家伙都由我处理。要让一个人凭空消失，可比让他凭空出现容易多了。"
 jialahe_backstory:"匹诺康尼猎犬家系的治安官，也是一位不修边幅、懒散随性的调饮师。着装颇为散漫，调饮更是随意，对来访宾客以礼相待，但保有戒心。似乎有着诸多往事，却从不主动提及。"
 hsr_paragon.41.name:"匹诺康尼-加拉赫"
 hsr_paragon.41.a:"初次见面"
 hsr_paragon.41.a.response:"我是加拉赫，这儿的「猎犬」之一。欢迎来到梦想之地「匹诺康尼」，新手无名客。"
 hsr_paragon.41.b:"爱好"
 hsr_paragon.41.b.response:"调饮是一门关乎感性的技术，在梦中调制汽水需加入当下的心情，如果烦闷，就浓郁一点；如果快乐，就甜蜜一些…调制饮料，也是调制人生。"
 hsr_paragon.41.c:"见闻"
 hsr_paragon.41.c.response:"如果哪天你看到一只发疯的茶壶，或者一台到处爬行的电话亭——那多半是遇上了「惊梦剧团」的捣乱鬼。别担心，死是死不了，最多脱层皮。"
 leader_jialahe_t1:"§M盐与犬§!"
 leader_jialahe_t1_desc:"无论经过多少时间，苏乐达的口味始终稳定如一…这就是添加剂的魅力。"
 leader_jialahe_t2:"§M酒花奔涌§!"
 leader_jialahe_t2_desc:"小心，别在美梦中陷得太深。"
 leader_jialahe_t3:"§M罐装特调§!"
 leader_jialahe_t3_desc:"直觉、本能…都能通过训练来提升。"
 leader_jialahe_t4:"§M临终的轻语§!"
 leader_jialahe_t4_desc:"还用说么？我当然更相信肌肉记忆。"
 leader_jialahe_t5:"§M血与沙§!"
 leader_jialahe_t5_desc:"在群星间仍有通路时，这个世界也留下过无名客的足迹。只可惜，匹诺康尼到底没能记下其中任何一个名字。"
