 leader_alan_t3_desc:"都给我闭嘴。\n$leader_alan_t3_effect_desc$"
 leader_alan_t3_effect_desc:"§B进入太空战时，额外对敌方舰队造成巨量护盾伤害和20%船体值的伤害§!"
