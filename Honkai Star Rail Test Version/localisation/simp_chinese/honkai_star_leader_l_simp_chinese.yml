#阿兰
 NAME_alan:"阿兰"
 alan_catch_phrase:"「为了保护大家受伤，本来就是一件值得自豪的事。」"
 alan_backstory:"不善言辞的空间站「黑塔」防卫科负责人。虽然不懂科研，但为了保护珍视研究的空间站科员顺利完成他们的研究，阿兰可以拼上性命。他早已习惯疼痛，并将负伤视作勋章。也只有抱着佩佩时，男孩才会放下戒备，露出难得一见的笑容。"
 hsr_paragon.4.name:"空间站「黑塔」-阿兰"
 hsr_paragon.4.a:"初次见面"
 hsr_paragon.4.a.response:"你好，开拓者，我是空间站「黑塔」的防卫科负责人阿兰，在空间站期间，我会全力护你安全。"
 hsr_paragon.4.b:"爱好"
 hsr_paragon.4.b.response:"大剑得时刻保持干净才行。"
 hsr_paragon.4.c:"见闻"
 hsr_paragon.4.c.response:"听科员说，有些奇物是自己主动要求来到空间站的。"
