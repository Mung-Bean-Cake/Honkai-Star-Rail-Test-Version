 #三月七
 NAME_sanyueqi:"三月七"
 sanyueqi_catch_phrase:"「拜托，你有见过这么好看的冰么？」"
 sanyueqi_backstory:"精灵古怪的少女，自认热衷于这个年纪的女孩子「应当热衷」的所有事，比如照相。从一块漂流的恒冰中苏醒，却发现自己对身世与过往都一无所知。短暂的消沉之后，她决定以重获新生的日期为自己命名。这一天，三月七「诞生」了。"
 hsr_paragon.58.name:"星穹列车-三月七"
 hsr_paragon.58.a:"初次见面"
 hsr_paragon.58.a.response:"你好，开拓者。欢迎入职星穹列车，我是三月七，星穹列车的乘员，也是你的同事。现在，请先拍摄入职照…瞧把你吓的，咱是在开玩笑啦~"
 hsr_paragon.58.b:"爱好"
 hsr_paragon.58.b.response:"拍照，写日记，还用说嘛~"
 hsr_paragon.58.c:"见闻"
 hsr_paragon.58.c.response:"即使看起来很「黑暗」的料理，也要拿出「开拓」的精神来面对！但，实话实说，砂鳗冻和姬子泡的咖啡真不太好……"
 leader_sanyueqi_t1:"§M可爱即是正义§!"
 leader_sanyueqi_t1_desc:"碰上我算你们运气不好。"
 leader_sanyueqi_t2:"§M余生的第一天§!"
 leader_sanyueqi_t2_desc:"偶尔也该认真一下。"
 leader_sanyueqi_t3:"§M少女的特权§!"
 leader_sanyueqi_t3_desc:"都是我找到的~"
 leader_sanyueqi_t4:"§M记忆中的一切§!"
 leader_sanyueqi_t4_desc:"哎呀，你来得正好，今天还没一起拍过照呢。"
 leader_sanyueqi_t5:"§M就这样，一直…§!"
 leader_sanyueqi_t5_desc:"我的过去，或许不在从前，而是在我的未来里。所以我一定会一站站走下去，哪怕有一天…没有列车。"
