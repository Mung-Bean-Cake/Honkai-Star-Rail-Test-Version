 NAME_daheita:"大黑塔"
 daheita_catch_phrase:"又见面了？纵观寰宇能见我第二面的人，你是第三百四十五个，以后这就是你的「黑塔编号」。记好，说不定有人要来考你。"
 daheita_backstory:"尊贵的「天才俱乐部」#83，人类，女性，年轻，貌美，可爱。传说她隐居在银河边境，几乎不踏出其间，想必此次现身——一定是为了某个不得不亲自出马的问题吧？"
 hsr_paragon.1.name:"天才俱乐部-大黑塔"
 hsr_paragon.1.a:"初次见面"
 hsr_paragon.1.a.response:"不认识我了？早和你说过——人类，女性，年轻，貌美，可爱。"
 hsr_paragon.1.b:"爱好"
 hsr_paragon.1.b.response:"我的衣橱嘛，应该也有一两座空间站的大小。当年博识尊先看了我一眼，从此世上就少了个「纯美」的令使。"
 hsr_paragon.1.c:"见闻"
 hsr_paragon.1.c.response:"代表凡人知识边界的是什么？很多人觉得是天才俱乐部，我觉得是我。"
