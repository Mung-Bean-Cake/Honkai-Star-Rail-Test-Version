 #知更鸟
 NAME_zhigengniao:"知更鸟"
 zhigengniao_catch_phrase:"她将自己的生活形容为一首歌，而那首歌的开始阴沉而苦涩。"
 zhigengniao_backstory:"出生于匹诺康尼，闻名银河的天环族歌者，举止从容优雅的少女。此次受家族宴请回到故乡，在「谐乐大典」为众宾献歌一曲。可以依靠「同谐」的力量传递歌声，在歌迷乃至万界生灵之中展现「共鸣」。"
 hsr_paragon.42.name:"匹诺康尼-知更鸟"
 hsr_paragon.42.a:"初次见面"
 hsr_paragon.42.a.response:"晚上好，我是来自家族的歌者知更鸟。不必拘谨，这只是一次舞台下的私人问候，能为我抽些时间吗？"
 hsr_paragon.42.b:"爱好"
 hsr_paragon.42.b.response:"偶尔戴上假发，换个妆容，再戴一副眼镜——这样去哪都不用担心了~"
 hsr_paragon.42.c:"见闻"
 hsr_paragon.42.c.response:"艾普瑟隆的发行商为我出过几张专辑，也邀请我过去住过一段时间。那颗星球的氛围很像匹诺康尼，但比起艺术，人们似乎更关心艺术所能带来的巨额利润……"
 leader_zhigengniao_t1:"§M模进乐段§!"
 leader_zhigengniao_t1_desc:"愿歌声为我们带来胜利。"
 leader_zhigengniao_t2:"§M翎之咏叹调§!"
 leader_zhigengniao_t2_desc:"该进入新乐章了。"
 leader_zhigengniao_t3:"§M夜色流光溢彩§!"
 leader_zhigengniao_t3_desc:"万籁，再次共鸣。"
 leader_zhigengniao_t4:"§M月隐的午夜§!"
 leader_zhigengniao_t4_desc:"愿你能在歌中寻得安宁。"
 leader_zhigengniao_t5:"§M千音迭奏，群星赋格§!"
 leader_zhigengniao_t5_desc:"别担心，我会一直陪在你身边。"
