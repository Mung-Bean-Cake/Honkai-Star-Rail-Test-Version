 #瓦尔特
 NAME_waerte:"瓦尔特"
 waerte_catch_phrase:"——既然暂时找不到回到家乡、回到和平生活的办法，那就再次开始战斗吧？这一次，无需背负命运，一切听从自己的旨意。"
 waerte_backstory:"老成持重的前逆熵盟主，继承了「世界」之名，曾屡次拯救世界于灭亡的边缘。圣方丹事件结束后，瓦尔特被迫与事件始作俑者去向星门另一侧。或许连他自己也未曾料到，在那里等待着的，将是全新的旅途和同伴。"
 hsr_paragon.61.name:"星穹列车-瓦尔特"
 hsr_paragon.61.a:"初次见面"
 hsr_paragon.61.a.response:"你好，我是瓦尔特·杨，遇到任何困难，欢迎随时来找我。"
 hsr_paragon.61.b:"爱好"
 hsr_paragon.61.b.response:"研究历史，制作动画…这两者并不矛盾。"
 hsr_paragon.61.c:"见闻"
 hsr_paragon.61.c.response:"你知道「存护」克里珀的信徒是怎么演变成「星际和平公司」的？神明要筑墙，而人类为了跟随神明的脚步，开始寻找筑墙的建材——这件事充满着黑色幽默。"
 leader_waerte_t1:"§M重力压制§!"
 leader_waerte_t1_desc:"浩瀚星海间，也将留下我们的痕迹。"
 leader_waerte_t2:"§M虚空断界§!"
 leader_waerte_t2_desc:"该下决断了。"
 leader_waerte_t3:"§M和平的祈愿§!"
 leader_waerte_t3_desc:"这片银河，容得下任何可能性。"
 leader_waerte_t4:"§M时空扭曲§!"
 leader_waerte_t4_desc:"这份力量的沉重，你一无所知。"
 leader_waerte_t5:"§M拟似黑洞§!"
 leader_waerte_t5_desc:"见识一下星辰粉碎的样子吧…生存还是毁灭，你别无选择。"
