#黑天鹅
 NAME_heitiane:"黑天鹅"
 heitiane_catch_phrase:"「生命是一座迂回的迷宫，除了记忆，我们一无所有。」"
 heitiane_backstory:"「流光忆庭」的忆者，神秘优雅的占卜师。常挂着温柔的微笑，耐心聆听他人的言语，并借此走入「记忆」，掌握全盘信息。热衷于收集独一无二的记忆，背后的想法却难以看透。"
 hsr_paragon.39.name:"匹诺康尼-黑天鹅"
 hsr_paragon.39.a:"初次见面"
 hsr_paragon.39.a.response:"开拓者？有趣的名字，唔，还有难以看穿的命运。"
 hsr_paragon.39.b:"爱好"
 hsr_paragon.39.b.response:"如果能先于世间察觉、收集一份记忆，那独自欣赏的时光，是我个人最钟爱的、独一无二的回忆。"
 hsr_paragon.39.c:"见闻"
 hsr_paragon.39.c.response:"有些忆者喜欢偷偷潜入他人的脑海，随意篡改他们的记忆…但我一点也不喜欢那么做。只有未经他人修改的记忆才足够真实和珍贵，否则，那只是别人插入你脑袋的思想罢了。"
 leader_heitiane_t1:"§M失坠，伪神的黄昏§!"
 leader_heitiane_t1_desc:"『要看见这些「记忆」，我会付出怎样的代价？』『在你愿意现身前，人们将无从知晓你的存在。』『就像人们看到黑天鹅前，从不知道天鹅不止白色一种？』『就像那样。』"
 leader_heitiane_t2:"§M无端命运的机杼§!"
 leader_heitiane_t2_desc:"「人们以为自己面对的是现在与未来，却无人知晓我们其实都在走向过去。」"
 leader_heitiane_t3:"§M泪水，亦是礼物§!"
 leader_heitiane_t3_desc:"「但梦…亦是记忆的一种变形。趁着那些窃忆者和焚化工还没到来，我会潜入深海，一睹残骸。」"
 leader_heitiane_t4:"§M沉醉于彼界的臂湾§!"
 leader_heitiane_t4_desc:"既定的轨迹已然显现。"
 leader_heitiane_t5:"§M重塑时光之忆§!"
 leader_heitiane_t5_desc:"静默的水面下…便是无尽深渊。"
