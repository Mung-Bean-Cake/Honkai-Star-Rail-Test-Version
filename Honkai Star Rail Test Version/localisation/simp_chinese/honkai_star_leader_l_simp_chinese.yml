 #开拓者
 NAME_kaituozhe:"开拓者"
 kaituozhe_catch_phrase:"昨日无需留恋。"
 kaituozhe_backstory:"为了消除星核带来的危机，少年开拓者选择与星穹列车同行。"
 hsr_paragon.62.name:"星穹列车-开拓者"
 hsr_paragon.62.a:"初次见面"
 hsr_paragon.62.a.response:"当有机会做出选择的时候，不要让自己后悔……"
 hsr_paragon.62.b:"回忆•帕姆"
 hsr_paragon.62.b.response:"虽然嘴上说着不高兴，身体的反应还是很真实的。还是多去找找帕姆吧！"
 hsr_paragon.62.c:"回忆•列车"
 hsr_paragon.62.c.response:"如果没有选择登上列车，我会度过怎样的一生…不，不会有如果。"
 leader_kaituozhe_t1:"§M蓄势§!"
 leader_kaituozhe_t1_desc:"机不可失。"
 leader_kaituozhe_t2:"§M不灭三振§!"
 leader_kaituozhe_t2_desc:"速战速决吧。"
 leader_kaituozhe_t3:"§M坠临万界的星芒§!"
 leader_kaituozhe_t3_desc:"以自己的意志，抵达结局吧。"
 leader_kaituozhe_t4:"§M星尘王牌§!"
 leader_kaituozhe_t4_desc:" 冰雪中，你恰如一团火，存护这个世界的灵魂——即使你将日日夜夜焚烧自己。"
 leader_kaituozhe_t5:"§M拓宇行天的意志§!"
 leader_kaituozhe_t5_desc:"如「开拓」沐浴星光，从这片土地再度启航。"
