  #姬子
 NAME_jizi:"姬子"
 jizi_catch_phrase:"「那是行至起点的旅程。」"
 jizi_backstory:"充满冒险精神的科学家，少女时代在故乡遭遇了搁浅的星穹列车。若干年后，当姬子终于修复列车驶入群星时，她意识到这只是个开始。在「开拓」新世界的道路上，需要更多的同伴——即使同行的人们面朝不同的方向，他们仍处于同一片星空下。"
 hsr_paragon.60.name:"星穹列车-姬子"
 hsr_paragon.60.a:"初次见面"
 hsr_paragon.60.a.response:"欢迎上车，开拓者，我是星穹列车的领航员，姬子。相信我们将会共度一段有趣的旅程。"
 hsr_paragon.60.b:"爱好"
 hsr_paragon.60.b.response:"拼配各种风味的咖啡豆是我的独门手艺，现在就给你泡一杯，推荐不加奶，黑咖啡最佳。"
 hsr_paragon.60.c:"见闻"
 hsr_paragon.60.c.response:"要在宇宙间搜寻自己的所求之物，大多数时候并非是「有了！就是那！」的灵光一现，而是「会是这个吗？万一不是呢？」的斟酌，怀疑与踌躇。"
 leader_jizi_t1:"§M灼热§!"
 leader_jizi_t1_desc:"战斗是一场精密的设计。"
 leader_jizi_t2:"§M熔核爆裂§!"
 leader_jizi_t2_desc:"我当然是来者不拒。"
 leader_jizi_t3:"§M乘胜追击§!"
 leader_jizi_t3_desc:"想不想来杯咖啡？"
 leader_jizi_t4:"§M银河铁道之夜§!"
 leader_jizi_t4_desc:"在帕姆眼里，我一直就是个列车维修工吧。"
 leader_jizi_t5:"§M天坠之火§!"
 leader_jizi_t5_desc:"人类从不掩饰掌控星空的欲望…当然，也包括我在内。"
 hsr_ui.60.title:"领袖详情-姬子"
 hsr_ui.60.desc:"$jizi_backstory$"
 hsr_ui.60.show:"$hsr_ui.60.a.desc$"
