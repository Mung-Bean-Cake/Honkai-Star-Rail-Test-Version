 #刃
 NAME_ren:"刃"
 ren_catch_phrase:"消磨自己，撕碎敌人，便是兵刃。"
 ren_backstory:"弃身锋刃的剑客，原名不详。效忠于「命运的奴隶」，拥有可怖的自愈能力。手持古剑作战，剑身遍布破碎裂痕，正如其身，亦如其心。"
 hsr_paragon.55.name:"星核猎手-刃"
 hsr_paragon.55.a:"初次见面"
 hsr_paragon.55.a.response:"开拓者...我不认识你。这对你而言，是件好事。"
 hsr_paragon.55.b:"爱好"
 hsr_paragon.55.b.response:"「刃」的存在，唯有挥剑的刹那，才能消失片刻。"
 hsr_paragon.55.c:"见闻"
 hsr_paragon.55.c.response:"已死之人，不知所惧。"
 leader_ren_t1:"§M业途风§!"
 leader_ren_t1_desc:"比我快的武器不可胜数，但上千回的交锋后又如何？"
 leader_ren_t2:"§M冶炼玄钢，铣淬寒芒§!"
 leader_ren_t2_desc:"以掌中之剑，送你一程。"
 leader_ren_t3:"§M吞忍百死§!"
 leader_ren_t3_desc:"死亡何时而至？我等得有些心焦了。"
 leader_ren_t4:"§M大辟万死§!"
 leader_ren_t4_desc:"死兆…将至！"
 leader_ren_t5:"§M命留魂销，复返此身§!"
 leader_ren_t5_desc:"此番美景，我虽求而不得……却能，邀诸位共赏。"
