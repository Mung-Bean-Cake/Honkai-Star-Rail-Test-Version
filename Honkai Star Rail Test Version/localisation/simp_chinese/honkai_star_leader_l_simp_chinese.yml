 #螺丝
 NAME_luosi:"螺丝咕姆"
 luosi_catch_phrase:"期待与每只微小的昆虫再见"
 luosi_backstory:"天才俱乐部#76，螺丝星（智械星球IX）的统治者。一向毒舌的黑塔都对他评价很高，称他是“真正的好人，一位绅士，拥有卓绝的机械头脑”。与黑塔、阮·梅，斯蒂芬·劳艾德共同推进了“模拟宇宙”项目；之后利用螺丝星的先进技术为模拟宇宙制作了全新项目分支“差分宇宙”。"
