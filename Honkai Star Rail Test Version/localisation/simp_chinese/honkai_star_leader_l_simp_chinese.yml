 #托帕
 NAME_tuopa:"托帕"
 tuopa_catch_phrase:"嗨，好久不见！最近怎么样？工作忙不忙，加班多吗？"
 tuopa_backstory:"星际和平公司旗下「战略投资部」高级干部托帕，领导特殊债务纠察小组。年纪轻轻便已成为「石心十人」之一，基石为「催讨黄玉」。搭档次元扑满「账账」则能敏锐感知财富所在，即便是安保、催债、精算等工作也不在话下。如今他们正一同巡行银河，追究各类影响公司业务开展的债务纠纷。"
 hsr_paragon.63.name:"星际和平公司-托帕"
 hsr_paragon.63.a:"初次见面"
 hsr_paragon.63.a.response:"初次见面，请容许我做个简单的自我介绍。我叫托帕，隶属星际和平公司的战略投资部。星穹列车和无名客，各位的事迹我早有耳闻，幸会！身边这位，就是我的好搭档啦。账账，来和大家打个招呼！"
 hsr_paragon.63.b:"爱好"
 hsr_paragon.63.b.response:"偌大的星空，亿万种可爱又神奇的小动物…就算只是为了它们，我也得努力呀！"
 hsr_paragon.63.c:"见闻"
 hsr_paragon.63.c.response:"家家都有本难念的经，这点道理我懂。可要是人人都为自己的原因欠债不还，整个系统就会崩溃——真到了那个时候，一个人的家长里短就会变成全世界的苦衷。"
 leader_tuopa_t1:"§M支付困难？§!"
 leader_tuopa_t1_desc:"必须提高风险意识……"
 leader_tuopa_t2:"§M金融动荡§!"
 leader_tuopa_t2_desc:"市场波动很正常，该出手时就出手吧~"
 leader_tuopa_t3:"§M技术性调整§!"
 leader_tuopa_t3_desc:"烦恼着，幸福着"
 leader_tuopa_t4:"§M需求膨胀§!"
 leader_tuopa_t4_desc:"连本带息，还债！"
 leader_tuopa_t5:"§M扭亏为盈！§!"
 leader_tuopa_t5_desc:"啊？对哦。目光放远，聚焦长线…就是投资成功的秘诀！"
