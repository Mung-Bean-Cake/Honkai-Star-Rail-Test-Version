#银狼
 NAME_yinlang:"银狼"
 yinlang_catch_phrase:"在朋克洛德，人们从来都是搭伙做事，独行的人，大多混不下去。所以混出头的那些，最后都成了传奇。"
 yinlang_backstory:"将宇宙视为游戏的超级骇客。 无论怎样棘手的防御系统，银狼都能轻松破解。她与「天才俱乐部」螺丝咕姆的数据攻防战，现已成为骇客界的传说。 宇宙中还有多少亟待攻破的关卡？银狼对此十分期待。"
 hsr_paragon.54.name:"星核猎手-银狼"
 hsr_paragon.54.a:"初次见面"
 hsr_paragon.54.a.response:"哟，开拓者，感觉你挺不错的呀，那颗星核对你没什么影响吗?"
 hsr_paragon.54.b:"爱好"
 hsr_paragon.54.b.response:"把头埋在抱枕里午睡和捏可爱的东西。"
 hsr_paragon.54.c:"见闻"
 hsr_paragon.54.c.response:"我喜欢的游戏总在同一天更新版本，他们是约好了么？"
 leader_yinlang_t1:"§M|系统警告|§!"
 leader_yinlang_t1_desc:"新手任务开始前"
 leader_yinlang_t2:"§M|强制结束进程|§!"
 leader_yinlang_t2_desc:"这次能让我玩得开心点么？"
 leader_yinlang_t3:"§M是否允许更改？§!"
 leader_yinlang_t3_desc:"嚯，开个金手指。"
 leader_yinlang_t4:"§M攻击载荷§!"
 leader_yinlang_t4_desc:"来点刺激的。"
 leader_yinlang_t5:"§M|账号已封禁|§!"
 leader_yinlang_t5_desc:"战斗体验该优化了。"
